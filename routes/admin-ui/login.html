<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storcale Admin — Login</title>
  <link rel="stylesheet" href="/admin-ui/static/app.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Storcale Admin</h1>
      <p class="sub">Sign in to manage the API.</p>

      <div class="field">
        <label for="user">Username</label>
        <input id="user" type="text" autocomplete="username" />
      </div>
      <div class="field">
        <label for="pass">Password</label>
        <input id="pass" type="password" autocomplete="current-password" />
      </div>
      <button id="login" class="btn btn-accent">Log in</button>
      <div id="note" class="login-error"></div>
    </div>
  </div>

  <script>
    const userEl = document.getElementById('user');
    const passEl = document.getElementById('pass');
    const noteEl = document.getElementById('note');
    const btnEl = document.getElementById('login');

    async function doLogin() {
      noteEl.textContent = '';
      btnEl.disabled = true;
      btnEl.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/admin-ui/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: userEl.value, password: passEl.value })
        });
        const j = await res.json();
        if (res.ok) {
          window.location.href = '/admin-ui/dashboard';
        } else {
          noteEl.textContent = j.error || 'Login failed';
        }
      } catch (e) {
        noteEl.textContent = 'Request failed: ' + e.message;
      } finally {
        btnEl.disabled = false;
        btnEl.textContent = 'Log in';
      }
    }

    btnEl.addEventListener('click', doLogin);
    passEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
