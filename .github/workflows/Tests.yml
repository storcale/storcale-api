name: Tests
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - tests
jobs:
  test-and-notify:
    runs-on: ubuntu-latest
    environment: env
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Setup Bun
        id: setup_bun
        continue-on-error: true
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        id: install
        continue-on-error: true
        if: steps.checkout.outcome == 'success' && steps.setup_bun.outcome == 'success'
        run: bun install --frozen-lockfile
      - name: Create files
        id: createfiles
        continue-on-error: true
        if: steps.checkout.outcome == 'success'
        env:
          GSA_KEY: ${{ secrets.GSA_KEY }}
          MATCHES_LOG_SAMPLE: ${{ secrets.MATCHESLOGSAMPLE }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path('access.log').touch(exist_ok=True)
          Path('envs').mkdir(parents=True, exist_ok=True)
          Path('routes/tniv/DB/match').mkdir(parents=True, exist_ok=True)

          with open('envs/gsaKey.env.json', 'w', encoding='utf-8') as fh:
              fh.write(os.environ.get('GSA_KEY', ''))

          gsa_size = Path('envs/gsaKey.env.json').stat().st_size
          print(f"Wrote envs/gsaKey.env.json ({gsa_size} bytes, GSA_KEY secret {'set' if os.environ.get('GSA_KEY') else 'EMPTY'})")

          with open('routes/tniv/DB/match/matches.log', 'w', encoding='utf-8') as fh:
              fh.write(os.environ.get('MATCHES_LOG_SAMPLE', ''))
          PY
      - name: Run tests
        id: tests
        continue-on-error: true
        if: steps.install.outcome == 'success' && steps.createfiles.outcome == 'success'
        env:
          NODE_ENV: github
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          VG_MAINFRAME: ${{ secrets.VG_MAINFRAME }}
          NODE_OPTIONS: --experimental-vm-modules
        run: |
          set +e
          set -o pipefail
          bunx jest --config jest.config.cjs --runInBand --timeout=30000 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit "${code}"
      - name: Collect logs
        id: collect
        if: always()
        run: |
          {
            printf "===== STEP OUTCOMES =====\n"
            printf "Checkout:        %s\n" "${{ steps.checkout.outcome }}"
            printf "Setup Bun:       %s\n" "${{ steps.setup_bun.outcome }}"
            printf "Install deps:    %s\n" "${{ steps.install.outcome }}"
            printf "Create files:    %s\n" "${{ steps.createfiles.outcome }}"
            printf "Run tests:       %s (exit_code=%s)\n" "${{ steps.tests.outcome }}" "${{ steps.tests.outputs.exit_code }}"

            printf "\n\n===== ACCESS LOG =====\n\n"
            if [ -f access.log ]; then
              cat access.log
            else
              printf "(access.log not found — likely failed before Create files ran)\n"
            fi

            printf "\n\n===== TEST OUTPUT =====\n\n"
            if [ -f test-output.txt ]; then
              cat test-output.txt
            else
              printf "(test-output.txt not found — Run tests step did not execute)\n"
            fi
          } > logs.log
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs.log
          if-no-files-found: warn
      - name: Send Discord webhook
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          TESTS_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_BUN_OUTCOME: ${{ steps.setup_bun.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          CREATEFILES_OUTCOME: ${{ steps.createfiles.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error
          import uuid
          from datetime import datetime, timezone

          webhook = os.environ.get("WEBHOOK_URL", "").strip()
          if not webhook:
              print("No WEBHOOK secret")
              sys.exit(0)

          if not webhook.endswith("wait=true"):
              sep = "&" if "?" in webhook else "?"
              webhook = f"{webhook}{sep}wait=true"

          outcome = os.environ.get("TESTS_OUTCOME", "unknown")
          exit_code = os.environ.get("TESTS_EXIT_CODE", "unknown")
          test_output_path = "test-output.txt"
          log_path = "logs.log"

          summary = "No test output captured."
          if os.path.exists(test_output_path):
              with open(test_output_path, "r", encoding="utf-8", errors="ignore") as fh:
                  lines = [line.rstrip() for line in fh.readlines() if line.strip()]
              summary = "\n".join(lines[-20:]) if lines else summary
          else:
              step_summary = []
              for label, env_name in [
                  ("Checkout", "CHECKOUT_OUTCOME"),
                  ("Setup Bun", "SETUP_BUN_OUTCOME"),
                  ("Install deps", "INSTALL_OUTCOME"),
                  ("Create files", "CREATEFILES_OUTCOME"),
              ]:
                  step_summary.append(f"{label}: {os.environ.get(env_name, 'unknown')}")
              summary = "No test output — job failed earlier.\n" + "\n".join(step_summary)

          passed = outcome == "success" and str(exit_code) == "0"
          color = 0x2ECC71 if passed else 0xE74C3C
          title = "✅ Tests passed" if passed else "❌ Tests failed"
          description = (
              f"Branch: {os.environ.get('GITHUB_REF_NAME', 'unknown')}\n"
              f"Commit: {os.environ.get('GITHUB_SHA', 'unknown')[:7]}\n"
              f"Actor: {os.environ.get('GITHUB_ACTOR', 'unknown')}\n"
              f"Exit code: {exit_code}\n\n"
              f"```text\n{summary}\n```"
          )

          payload = {
              "embeds": [{
                  "title": title,
                  "description": description,
                  "color": color,
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "footer": {"text": "GitHub Actions"},
              }]
          }

          boundary = f"----WebKitFormBoundary{uuid.uuid4().hex}"
          body = bytearray()

          def add_field(name, value, content_type=None):
              body.extend(f"--{boundary}\r\n".encode("utf-8"))
              disp = f'Content-Disposition: form-data; name="{name}"'
              body.extend(f"{disp}\r\n".encode("utf-8"))
              if content_type:
                  body.extend(f"Content-Type: {content_type}\r\n".encode("utf-8"))
              body.extend(b"\r\n")
              if isinstance(value, bytes):
                  body.extend(value)
              else:
                  body.extend(value.encode("utf-8"))
              body.extend(b"\r\n")

          add_field("payload_json", json.dumps(payload), "application/json")

          if os.path.exists(log_path):
              with open(log_path, "rb") as fh:
                  file_bytes = fh.read()
              body.extend(f"--{boundary}\r\n".encode("utf-8"))
              body.extend(
                  b'Content-Disposition: form-data; name="files[0]"; filename="logs.log"\r\n'
              )
              body.extend(b"Content-Type: text/plain; charset=utf-8\r\n\r\n")
              body.extend(file_bytes)
              body.extend(b"\r\n")

          body.extend(f"--{boundary}--\r\n".encode("utf-8"))
          body = bytes(body)

          request = urllib.request.Request(
              webhook,
              data=body,
              headers={
                  "Content-Type": f"multipart/form-data; boundary={boundary}",
                  "Content-Length": str(len(body)),
                  "User-Agent": "GitHubActions-DiscordWebhook/1.0",
              },
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  print(f"Webhook sent: {response.status}")
          except urllib.error.HTTPError as e:
              print(f"Webhook failed: {e.code} {e.reason}")
              print(e.read().decode(errors="ignore"))
              sys.exit(0)
          PY
      - name: Enforce test result
        if: always()
        run: |
          FAILED=0
          for outcome in \
            "${{ steps.checkout.outcome }}" \
            "${{ steps.setup_bun.outcome }}" \
            "${{ steps.install.outcome }}" \
            "${{ steps.createfiles.outcome }}" \
            "${{ steps.tests.outcome }}"
          do
            if [ "$outcome" != "success" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more steps failed — see the logs artifact and Discord message for details."
            exit 1
          fi