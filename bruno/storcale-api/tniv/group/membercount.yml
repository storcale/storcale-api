info:
  name: membercount
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:9902/api/tniv/group/membercount?groupId=3612873&year=2026&month=05
  params:
    - name: groupId
      value: "3612873"
      type: query
    - name: year
      value: "2026"
      type: query
    - name: month
      value: "05"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body.membercount
      operator: isNumber

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
